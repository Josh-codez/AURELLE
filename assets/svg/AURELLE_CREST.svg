<svg width="400" height="400" viewBox="0 0 400 400" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>AURELLE Crest Monogram</title>
  <desc>Circular crest with A monogram, crown, and diamond accents for AURELLE fine dining.</desc>

  <defs>
    <linearGradient id="goldSheen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F1F0CC;stop-opacity:1" />
      <stop offset="35%" style="stop-color:#D5BF86;stop-opacity:1" />
      <stop offset="65%" style="stop-color:#8D775F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D5BF86;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldSheen2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F1F0CC;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#D5BF86;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8D775F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2A0810;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3F0D12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2A0810;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)" />

  <!-- ═══════════════════════════════════════ -->
  <!--  CIRCULAR FRAME                        -->
  <!-- ═══════════════════════════════════════ -->

  <circle cx="200" cy="200" r="162" fill="none" stroke="#D5BF86" stroke-width="0.4" opacity="0.25" />
  <circle cx="200" cy="200" r="152" fill="none" stroke="url(#goldSheen2)" stroke-width="0.8" />
  <circle cx="200" cy="200" r="145" fill="none" stroke="#8D775F" stroke-width="0.3" opacity="0.5" />
  <circle cx="200" cy="200" r="138" fill="none" stroke="url(#goldSheen)" stroke-width="1.6" />
  <circle cx="200" cy="200" r="130" fill="none" stroke="#8D775F" stroke-width="0.4" opacity="0.6" />
  <circle cx="200" cy="200" r="128" fill="#3F0D12" fill-opacity="0.45" />

  <!-- ═══════════════════════════════════════ -->
  <!--  CARDINAL DIAMOND ACCENTS              -->
  <!-- ═══════════════════════════════════════ -->

  <!-- Top -->
  <polygon points="200,57 204.5,64 200,71 195.5,64" fill="url(#goldSheen)" />
  <!-- Bottom -->
  <polygon points="200,329 204.5,336 200,343 195.5,336" fill="url(#goldSheen)" />
  <!-- Left -->
  <polygon points="57,200 64,204.5 71,200 64,195.5" fill="url(#goldSheen)" />
  <!-- Right -->
  <polygon points="329,200 336,204.5 343,200 336,195.5" fill="url(#goldSheen)" />

  <!-- Dot accents between diamonds -->
  <circle cx="128" cy="78"  r="2" fill="#8D775F" opacity="0.7"/>
  <circle cx="272" cy="78"  r="2" fill="#8D775F" opacity="0.7"/>
  <circle cx="128" cy="322" r="2" fill="#8D775F" opacity="0.7"/>
  <circle cx="272" cy="322" r="2" fill="#8D775F" opacity="0.7"/>
  <circle cx="78"  cy="130" r="2" fill="#8D775F" opacity="0.7"/>
  <circle cx="78"  cy="270" r="2" fill="#8D775F" opacity="0.7"/>
  <circle cx="322" cy="130" r="2" fill="#8D775F" opacity="0.7"/>
  <circle cx="322" cy="270" r="2" fill="#8D775F" opacity="0.7"/>

  <!-- ═══════════════════════════════════════ -->
  <!--  CROWN ACCENT                          -->
  <!-- ═══════════════════════════════════════ -->

  <g transform="translate(200, 108)">
    <rect x="-22" y="14" width="44" height="5" rx="1" fill="url(#goldSheen)" opacity="0.9"/>
    <polygon points="-22,14 -22,-2 -11,8 0,-4 11,8 22,-2 22,14" fill="url(#goldSheen)" opacity="0.85"/>
    <circle cx="0"   cy="-4" r="2.2" fill="#A71D31" stroke="#D5BF86" stroke-width="0.8"/>
    <circle cx="-11" cy="8"  r="1.5" fill="#D5BF86"/>
    <circle cx="11"  cy="8"  r="1.5" fill="#D5BF86"/>
    <circle cx="-22" cy="-2" r="1.5" fill="#D5BF86"/>
    <circle cx="22"  cy="-2" r="1.5" fill="#D5BF86"/>
  </g>

  <!-- ═══════════════════════════════════════ -->
  <!--  MONOGRAM "A"                          -->
  <!-- ═══════════════════════════════════════ -->

  <!-- Solid serif A body -->
  <path d="
    M 200 138
    L 253 275
    L 245 275
    L 230 238 L 170 238 L 156 275
    L 147 275
    Z
    M 176 228 L 200 165 L 224 228 Z
  " fill="url(#goldSheen)" opacity="0.92"/>

  <!-- Bottom serifs -->
  <rect x="134" y="275" width="26" height="2.5" rx="1" fill="url(#goldSheen)" opacity="0.9"/>
  <rect x="240" y="275" width="26" height="2.5" rx="1" fill="url(#goldSheen)" opacity="0.9"/>

  <!-- Crossbar -->
  <rect x="158" y="229" width="84" height="2" rx="1" fill="url(#goldSheen)" opacity="0.85"/>

  <!-- ═══════════════════════════════════════ -->
  <!--  RUBY DIAMOND BELOW A                  -->
  <!-- ═══════════════════════════════════════ -->

  <polygon points="200,293 203.5,298 200,303 196.5,298" fill="#A71D31" stroke="#D5BF86" stroke-width="0.8"/>

  <!-- ═══════════════════════════════════════ -->
  <!--  INNER HORIZONTAL RULES                -->
  <!-- ═══════════════════════════════════════ -->

  <line x1="90"  y1="200" x2="162" y2="200" stroke="url(#goldSheen)" stroke-width="0.5" opacity="0.5"/>
  <line x1="238" y1="200" x2="310" y2="200" stroke="url(#goldSheen)" stroke-width="0.5" opacity="0.5"/>
  <polygon points="200,195 204,200 200,205 196,200" fill="none" stroke="#8D775F" stroke-width="0.6" opacity="0.4"/>

</svg>
